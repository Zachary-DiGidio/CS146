<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Results — InstaSnitch</title>
  <link rel="stylesheet" href="results.css" />
</head>
<body>
  <div class="card">
    <p class="results-username">@<span id="display-username">username</span></p>
    <p class="results-note">Here's your Instagram breakdown. Wait for Follower Activity</p>

    <div class="stats-grid">
      <div class="stat-box">
        <span class="stat-num" id="followers-count">—</span>
        <span class="stat-label">Followers</span>
      </div>
      <div class="stat-box">
        <span class="stat-num red" id="following-count">—</span>
        <span class="stat-label">Following</span>
      </div>
    </div>

    <div id="unfollow-list"></div>

    <a class="back-link" href="index.html">← Check another account</a>
  </div>
</body>
</html>
